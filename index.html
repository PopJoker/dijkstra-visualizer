<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijkstra Visualizer Pro</title>

    <link rel="icon" href="./mapicon2.png" type="image/png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="controls">
        <h3>Dijkstra 視覺化</h3>
        <div id="status" class="status">點擊地圖選擇起點</div>
        <div class="legend">
            <span class="dot exploring"></span> 搜索區域
            <span class="dot path"></span> 最短路徑
        </div>
        <button id="reset-btn">清除重新開始</button>

        <div class="footer-links">
            <hr>
            <a href="https://popjoker.github.io/pop-blog/" target="_blank" rel="noopener noreferrer">
                這我 POP-BLOG
            </a>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="./main.js" defer></script>
</body>

</html>
